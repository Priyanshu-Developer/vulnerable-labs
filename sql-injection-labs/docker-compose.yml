services:
  db:
    image: postgres:latest   # latest version (v18+)
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sql_injection_labs
      POSTGRES_PORT: 5432
    ports:
      - "5433:5432"         # map to host port to avoid conflicts
    volumes:
      - db_data:/var/lib/postgresql   # important change for Postgres 18+
    restart: always

  webapp:
    build: ./webapp
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sql_injection_labs
    restart: always

volumes:
  db_data:
